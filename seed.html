window.runSeed = async function(){
  const btn = document.getElementById('btn');
  btn.disabled = true;
  btn.textContent = '⏳ Se rulează...';
  log('🚀 Pornind seed-ul...','info');

  try {
    // Staff
    log('👥 Adăugare 40 angajați...','info');
    for(const s of STAFF){
      await addDoc(collection(db,'staff'),{...s, createdAt:serverTimestamp()});
      log(`  ✓ ${s.firstName} ${s.lastName} (${s.department})`);
    }

    // Clients
    log('🏢 Adăugare 10 clienți...','info');
    for(const c of CLIENTS){
      await addDoc(collection(db,'clients'),{...c, createdAt:serverTimestamp()});
      log(`  ✓ ${c.name}`);
    }

    // Projects
    log('📋 Adăugare proiecte...','info');
    for(const p of PROJECTS_DATA){
      const tags = p.col==='comenzi'?['Brief','Contract']:p.col==='grafica'?['Design','Concept']:p.col==='autocad'?['AutoCAD','Debitare']:p.col==='atelier'?['Producție','Asamblare']:['Montaj','Recepție'];
      const tagsA = p.urg==='h'?['Urgent']:p.col==='implementare'?['Final']:[];
      const tasks = [
        {t:'Primire brief',d:p.prog>5},
        {t:'Semnare contract',d:p.prog>15},
        {t:'Proiectare grafică',d:p.prog>35},
        {t:'Aprobare client',d:p.prog>55},
        {t:'Proiectare tehnică',d:p.prog>65},
        {t:'Producție atelier',d:p.prog>75},
        {t:'Control calitate',d:p.prog>85},
        {t:'Montaj & Recepție',d:p.prog>92},
      ];
      await addDoc(collection(db,'projects'),{
        ...p, tags, tagsA, tasks,
        createdAt:serverTimestamp()
      });
      log(`  ✓ ${p.client} – ${p.type}`);
    }

    log('','');
    log('✅ SEED COMPLET! Poți închide această pagină și deschide aplicația.','ok');
    btn.textContent = '✅ Gata!';
  } catch(err){
    log('❌ Eroare: '+err.message,'err');
    btn.disabled=false;
    btn.textContent='▶ Încearcă din nou';
  }
};
</script>
